<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b141a;
      color: white;
    }

    .app {
      max-width: 400px;
      height: 100vh;
      margin: auto;
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      flex-direction: column;
      height: 100%;
    }

    .active {
      display: flex;
    }

    .center {
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    input {
      padding: 10px;
      width: 80%;
    }

    button {
      padding: 10px;
      background: #00a884;
      border: none;
      color: white;
      cursor: pointer;
    }

    .header {
      padding: 10px;
      background: #202c33;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-btn {
      cursor: pointer;
      font-size: 18px;
    }

    .logout-btn {
      cursor: pointer;
      font-size: 14px;
      color: #ff6b6b;
    }

    .new-chat-btn {
      cursor: pointer;
      font-size: 14px;
      color: white;
      background: #00a884;
      padding: 8px 10px;
      border-radius: 6px;
    }

    .users {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .section-title {
      font-size: 12px;
      color: #8696a0;
      margin-top: 10px;
      margin-bottom: 4px;
    }

    .user {
      padding: 10px;
      background: #2a3942;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .user:hover {
      background: #334b57;
    }

    .session {
      align-items: flex-start;
      gap: 8px;
    }

    .session-main {
      flex: 1;
      min-width: 0;
    }

    .session-message {
      font-size: 14px;
      color: #d1d7db;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .session-time {
      font-size: 11px;
      color: #8696a0;
      white-space: nowrap;
      margin-top: 2px;
    }

    .session-unread {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .unread-badge {
      min-width: 16px;
      height: 16px;
      padding: 0 5px;
      border-radius: 9px;
      background: #00ff88;
      color: #0b141a;
      font-size: 11px;
      line-height: 16px;
      text-align: center;
      font-weight: bold;
    }

    .empty-state {
      color: #8696a0;
      text-align: center;
      margin-top: 30px;
      font-size: 14px;
    }

    .user-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .online {
      background: #00ff88;
    }

    .offline {
      background: gray;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      max-width: 70%;
      margin: 5px 0;
      padding: 8px;
      border-radius: 10px;
      position: relative;
    }

    .sent {
      background: #005c4b;
      margin-left: auto;
    }

    .received {
      background: #202c33;
    }

    .status {
      font-size: 10px;
      position: absolute;
      bottom: 2px;
      right: 5px;
      color: #aaa;
    }

    .input {
      display: flex;
      padding: 5px;
      background: #202c33;
    }

    .input input {
      flex: 1;
      padding: 8px;
    }
  </style>
</head>

<body>

<div class="app">

  <!-- LOGIN -->
  <div id="loginScreen" class="screen active center">
    <h2>Enter Your Name</h2>
    <input id="nameInput" placeholder="Your name">
    <button onclick="join()">Continue</button>
  </div>

  <!-- USER LIST -->
  <div id="userScreen" class="screen">
    <div class="header">
      <div>Chats</div>
      <div class="logout-btn" onclick="logout()">Logout</div>
    </div>

    <div class="users" id="users"></div>
  </div>

  <!-- SESSION LIST -->
  <div id="sessionScreen" class="screen">
    <div class="header">
      <div class="header-left">
        <div class="back-btn" onclick="backToUsers()">←</div>
        <div id="sessionHeader"></div>
      </div>
      <div class="new-chat-btn" onclick="createNewSession()">+ New Chat</div>
    </div>

    <div class="users" id="sessions"></div>
  </div>

  <!-- CHAT -->
  <div id="chatScreen" class="screen">
    <div class="header">
      <div class="header-left">
        <div class="back-btn" onclick="goBack()">←</div>
        <div id="chatHeader"></div>
      </div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input">
      <input id="messageInput" placeholder="message">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io("http://192.168.x.x:3000");

let currentUser = null;
let currentChatUser = null;
let currentChatUserName = null;
let currentConversationId = null;
let currentSessions = [];
let allMessages = [];
let currentUserList = [];
let activeScreen = "loginScreen";
let sessionRefreshTimer = null;

// ================= NORMALIZE =================
function normalize(str) {
  return str.trim().toLowerCase();
}

// ================= SCREEN =================
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  activeScreen = id;

  if (id === "sessionScreen") {
    startSessionRefresh();
  } else {
    stopSessionRefresh();
  }
}

// ================= JOIN =================
function join() {
  let name = document.getElementById("nameInput").value;
  if (!name) return;

  const userId = normalize(name);
  const cleanName = name.trim();

  socket.emit("register", { userId, name: cleanName }, (res) => {
    currentUser = res.userId;
    showScreen("userScreen");
    socket.emit("get_users");
  });
}

// ================= LOGOUT =================
function logout() {
  currentUser = null;
  currentChatUser = null;
  currentChatUserName = null;
  currentConversationId = null;
  currentSessions = [];
  allMessages = [];
  currentUserList = [];

  document.getElementById("nameInput").value = "";
  document.getElementById("users").innerHTML = "";
  document.getElementById("sessions").innerHTML = "";
  document.getElementById("chat").innerHTML = "";

  showScreen("loginScreen");
}

// ================= BACK =================
function goBack() {
  currentConversationId = null;
  document.getElementById("chat").innerHTML = "";
  showScreen("sessionScreen");
  loadConversations();
}

function backToUsers() {
  currentChatUser = null;
  currentChatUserName = null;
  currentConversationId = null;
  currentSessions = [];
  document.getElementById("sessions").innerHTML = "";
  showScreen("userScreen");
}

// ================= USERS =================
socket.on("user_list", (list) => {
  currentUserList = Array.isArray(list) ? list : [];
  renderUserList();
});

function renderUserList() {
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  const onlineUsers = currentUserList.filter(u => u.online && u.userId !== currentUser);
  const offlineUsers = currentUserList.filter(u => !u.online && u.userId !== currentUser);

  if (onlineUsers.length > 0) {
    const title = document.createElement("div");
    title.className = "section-title";
    title.innerText = "ONLINE";
    usersDiv.appendChild(title);

    onlineUsers.forEach(u => {
      usersDiv.appendChild(createUserItem(u, true));
    });
  }

  if (offlineUsers.length > 0) {
    const title = document.createElement("div");
    title.className = "section-title";
    title.innerText = "OFFLINE";
    usersDiv.appendChild(title);

    offlineUsers.forEach(u => {
      usersDiv.appendChild(createUserItem(u, false));
    });
  }
}

// ================= USER ITEM =================
function createUserItem(user, isOnline) {
  const div = document.createElement("div");
  div.className = "user";
  const unread = getUserUnreadCount(user.userId);

  const left = document.createElement("div");
  left.className = "user-left";

  const dot = document.createElement("div");
  dot.className = "dot " + (isOnline ? "online" : "offline");

  const name = document.createElement("div");
  name.innerText = user.name;

  left.appendChild(dot);
  left.appendChild(name);
  div.appendChild(left);

  if (unread > 0) {
    const unreadWrap = document.createElement("div");
    unreadWrap.className = "session-unread";

    const unreadDot = document.createElement("div");
    unreadDot.className = "dot online";

    const badge = document.createElement("div");
    badge.className = "unread-badge";
    badge.innerText = unread;

    unreadWrap.appendChild(unreadDot);
    unreadWrap.appendChild(badge);
    div.appendChild(unreadWrap);
  }

  div.onclick = () => {
    currentChatUser = user.userId;
    currentChatUserName = user.name;
    currentConversationId = null;
    document.getElementById("sessionHeader").innerText = user.name;
    document.getElementById("chatHeader").innerText = user.name;
    showScreen("sessionScreen");
    loadConversations();
  };

  return div;
}

function getUserUnreadCount(userId) {
  return allMessages.filter(m =>
    m.receiverId === currentUser &&
    m.status !== "read" &&
    (
      m.senderId === userId ||
      m.receiverId === userId
    )
  ).length;
}

// ================= SESSIONS =================
function loadConversations() {
  if (!currentUser || !currentChatUser) return;

  socket.emit("get_conversations", {
    userId: currentUser
  });
}

function startSessionRefresh() {
  stopSessionRefresh();

  sessionRefreshTimer = setInterval(() => {
    if (activeScreen === "sessionScreen") {
      loadConversations();
    }
  }, 1500);
}

function stopSessionRefresh() {
  if (sessionRefreshTimer) {
    clearInterval(sessionRefreshTimer);
    sessionRefreshTimer = null;
  }
}

socket.on("conversation_list", (list) => {
  currentSessions = Array.isArray(list) ? list : [];
  currentSessions.forEach(session => {
    if (Array.isArray(session.messages)) {
      mergeMessages(session.messages.map(msg => ({
        ...msg,
        conversationId: msg.conversationId || getSessionId(session)
      })));
    }
  });
  renderSessions();
  renderUserList();
});

function renderSessions() {
  const sessionsDiv = document.getElementById("sessions");
  sessionsDiv.innerHTML = "";

  const sessions = currentSessions
    .filter(session => isCurrentChatSession(session))
    .filter(session => hasMessages(session))
    .sort((a, b) => getSessionTime(b) - getSessionTime(a));

  if (sessions.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty-state";
    empty.innerText = "No conversations yet";
    sessionsDiv.appendChild(empty);
    return;
  }

  sessions.forEach(session => {
    sessionsDiv.appendChild(createSessionItem(session));
  });
}

function isCurrentChatSession(session) {
  if (!currentChatUser || !Array.isArray(session.participants)) return true;
  return session.participants.includes(currentChatUser);
}

function hasMessages(session) {
  if (Array.isArray(session.messages)) return session.messages.length > 0;
  if (typeof session.messageCount === "number") return session.messageCount > 0;
  if (typeof session.messagesCount === "number") return session.messagesCount > 0;
  return !!getSessionLastMessage(session);
}

function getSessionId(session) {
  return session.conversationId || session._id || session.id;
}

function getSessionLastMessage(session) {
  if (session.lastMessage && typeof session.lastMessage === "object") {
    return session.lastMessage.text || session.lastMessage.message || "";
  }

  return session.lastMessage || session.message || "";
}

function getSessionTime(session) {
  const value =
    session.lastMessageAt ||
    session.updatedAt ||
    session.createdAt ||
    (session.lastMessage && session.lastMessage.createdAt);

  const time = value ? new Date(value).getTime() : 0;
  return Number.isNaN(time) ? 0 : time;
}

function formatSessionTime(session) {
  const time = getSessionTime(session);
  if (!time) return "";

  return new Date(time).toLocaleString([], {
    month: "short",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function createSessionItem(session) {
  const div = document.createElement("div");
  div.className = "user session";
  const unreadCount = getUnreadCount(session);

  const main = document.createElement("div");
  main.className = "session-main";

  const message = document.createElement("div");
  message.className = "session-message";
  message.innerText = getSessionLastMessage(session);

  const time = document.createElement("div");
  time.className = "session-time";
  time.innerText = formatSessionTime(session);

  main.appendChild(message);
  main.appendChild(time);
  div.appendChild(main);

  if (unreadCount > 0) {
    const unread = document.createElement("div");
    unread.className = "session-unread";

    const dot = document.createElement("div");
    dot.className = "dot online";

    const badge = document.createElement("div");
    badge.className = "unread-badge";
    badge.innerText = unreadCount;

    unread.appendChild(dot);
    unread.appendChild(badge);
    div.appendChild(unread);
  }

  div.onclick = () => openSession(getSessionId(session));

  return div;
}

function getUnreadCount(session) {
  const conversationId = getSessionId(session);

  return allMessages.filter(msg => (
    msg.conversationId === conversationId &&
    msg.receiverId === currentUser &&
    msg.status !== "read"
  )).length;
}

function createNewSession() {
  if (!currentUser || !currentChatUser) return;

  socket.emit("create_conversation", {
    from: currentUser,
    to: currentChatUser
  }, (conversation) => {
    const conversationId = getSessionId(conversation || {});
    if (conversationId) openSession(conversationId);
  });
}

function openSession(conversationId) {
  if (!conversationId) return;

  currentConversationId = conversationId;
  document.getElementById("chatHeader").innerText = currentChatUserName || currentChatUser;
  document.getElementById("chat").innerHTML = "";
  showScreen("chatScreen");

  socket.emit("load_messages", {
    conversationId,
    user1: currentUser,
    user2: currentChatUser
  });
}

// ================= CHAT =================
socket.on("chat_history", (messages) => {
  const chat = document.getElementById("chat");
  chat.innerHTML = "";

  const normalizedMessages = messages.map(msg => ({
    ...msg,
    conversationId: msg.conversationId || currentConversationId
  }));

  mergeMessages(normalizedMessages, currentConversationId);

  normalizedMessages.forEach(renderMessage);

  normalizedMessages.forEach(msg => {
    if (shouldMarkMessageRead(msg)) {
      markLocalMessageRead(msg);
      socket.emit("message_read", { messageId: msg.messageId });
    }
  });

  renderSessions();
  renderUserList();
});

// ================= RECEIVE =================
socket.on("receive_message", (msg) => {
  const normalizedMsg = {
    ...msg,
    conversationId: msg.conversationId || msg.conversation
  };

  mergeMessages([normalizedMsg]);

  if (shouldMarkMessageRead(normalizedMsg)) {
    renderMessage(normalizedMsg);
    markLocalMessageRead(normalizedMsg);
    socket.emit("message_read", { messageId: normalizedMsg.messageId });
  } else if (currentChatUser && (msg.senderId === currentChatUser || msg.receiverId === currentChatUser)) {
    loadConversations();
    renderSessions();
  }

  renderUserList();
});

// ================= STATUS =================
socket.on("message_status", ({ clientId, messageId, status }) => {
  const el =
    document.querySelector(`[data-id="${clientId}"] .status`) ||
    document.querySelector(`[data-msg="${messageId}"] .status`);

  if (el) el.innerText = getStatusIcon(status);
  updateLocalMessageStatus({ clientId, messageId, status });
  renderSessions();
  renderUserList();
});

// ================= SEND =================
function sendMessage() {
  const text = document.getElementById("messageInput").value;
  if (!text || !currentChatUser || !currentConversationId) return;

  const clientId = Date.now().toString();

  const localMessage = {
    senderId: currentUser,
    receiverId: currentChatUser,
    text,
    clientId,
    conversationId: currentConversationId,
    status: "sent"
  };

  mergeMessages([localMessage]);
  renderMessage(localMessage);

  socket.emit("send_message", {
    from: currentUser,
    to: currentChatUser,
    message: text,
    clientId,
    conversationId: currentConversationId
  });

  document.getElementById("messageInput").value = "";
}

function shouldMarkMessageRead(msg) {
  return (
    activeScreen === "chatScreen" &&
    currentConversationId &&
    msg.conversationId === currentConversationId &&
    msg.receiverId === currentUser &&
    msg.status !== "read"
  );
}

function getMessageKey(msg) {
  return msg.messageId || msg.clientId;
}

function mergeMessages(messages, replaceConversationId) {
  if (replaceConversationId) {
    allMessages = allMessages.filter(msg => msg.conversationId !== replaceConversationId);
  }

  messages.forEach(msg => {
    const key = getMessageKey(msg);

    if (!key) {
      allMessages.push(msg);
      return;
    }

    const index = allMessages.findIndex(existing => getMessageKey(existing) === key);

    if (index >= 0) {
      allMessages[index] = { ...allMessages[index], ...msg };
    } else {
      allMessages.push(msg);
    }
  });
}

function markLocalMessageRead(msg) {
  updateLocalMessageStatus({
    clientId: msg.clientId,
    messageId: msg.messageId,
    status: "read"
  });
}

function updateLocalMessageStatus({ clientId, messageId, status }) {
  allMessages = allMessages.map(msg => {
    const sameClient = clientId && msg.clientId === clientId;
    const sameMessage = messageId && msg.messageId === messageId;

    if (sameClient || sameMessage) {
      return { ...msg, status };
    }

    return msg;
  });
}

// ================= ICON =================
function getStatusIcon(status) {
  if (status === "sent") return "✓";
  if (status === "delivered") return "✓✓";
  if (status === "read") return "👁";
  return "";
}

// ================= RENDER =================
function renderMessage(msg) {
  const chat = document.getElementById("chat");

  const isMine = msg.senderId === currentUser;

  const div = document.createElement("div");
  div.className = "msg " + (isMine ? "sent" : "received");

  div.dataset.id = msg.clientId;
  div.dataset.msg = msg.messageId;

  div.innerHTML = `
    ${msg.text}
    <div class="status">${isMine ? getStatusIcon(msg.status) : ""}</div>
  `;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
